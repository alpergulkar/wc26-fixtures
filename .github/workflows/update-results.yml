name: Skorları güncelle

# Dünya Kupası 2026 skorlarını periyodik olarak çekip results.json'a yazar.
# Çalışması için depo ayarlarında bir secret tanımlayın:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name: FOOTBALL_DATA_TOKEN   Value: <football-data.org API anahtarınız>

on:
  schedule:
    - cron: "*/15 * * * *"   # her 15 dakikada bir (UTC)
  workflow_dispatch:          # elle de tetiklenebilir

permissions:
  contents: write             # results.json'u commit edebilmek için

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sonuçları çek
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node fetch-results.js

      - name: Değişiklikleri commit'le
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet || git commit -m "results.json otomatik güncellendi"
          git push
